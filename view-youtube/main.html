<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube Fullscreen Looper</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: #000;
        }

        /* 動画を少し大きくして、YouTubeのロゴやタイトルを画面外に追い出す */
        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            border: none;
            /* pointer-events: none; を削除（広告スキップを押せるようにするため） */
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            color: white;
            font-family: sans-serif;
            cursor: pointer;
            font-size: 32px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        画面をクリックして<br>音声ありで再生開始
    </div>

    <div id="video-container">
        <div id="player"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
