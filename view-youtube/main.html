<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube Fullscreen Looper</title>
    <style>
        /* 1920x1080 固定サイズ */
        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: #000;
        }

        #video-container {
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* マウス操作を無効化 */
        }
    </style>
</head>
<body>
    <div id="video-container">
        <div id="player"></div>
    </div>
    <!-- JavaScriptの読み込み -->
    <script src="script.js"></script>
</body>
</html>
