<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube Fullscreen Looper</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: #000;
        }

        #video-container {
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        /* 音声を出すためのクリック待機画面 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            color: white;
            font-family: sans-serif;
            cursor: pointer;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div id="overlay">画面をクリックして再生開始（音声あり）</div>

    <div id="video-container">
        <div id="player"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
